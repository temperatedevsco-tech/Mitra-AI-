<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Create account • Mitra AI</title>

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/auth.css') }}"
    />
  </head>

  <body>
    <div class="container">
      <div class="brand-panel">
        <div class="logo">Mitra</div>

        <p class="tagline">
          A companion that<br /><span class="hl">remembers the thread.</span>
        </p>

        <svg
          class="thread"
          viewBox="0 0 260 36"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
          aria-hidden="true"
        >
          <defs>
            <linearGradient
              id="tg2"
              x1="0"
              y1="0"
              x2="260"
              y2="0"
              gradientUnits="userSpaceOnUse"
            >
              <stop offset="0" stop-color="#F3A559" />
              <stop offset="1" stop-color="#E888A3" />
            </linearGradient>
          </defs>
          <path
            d="M2 18C30 3, 60 33, 92 18S150 3, 182 18S230 33, 258 18"
            stroke="url(#tg2)"
            stroke-width="2.5"
            stroke-linecap="round"
          />
        </svg>
      </div>

      <div class="form-panel">
        <div class="card">
          <h1>Create account</h1>
          {% with messages = get_flashed_messages() %} {% if messages %}

          <div class="flash">{{ messages[0] }}</div>

          {% endif %} {% endwith %}
          <p class="sub">Join Mitra AI — it takes a minute.</p>

          <form action="/register" method="POST">
            {{ form.hidden_tag() }}
            <div class="field">
              <label for="username">Username</label>
              <input
                id="username"
                type="text"
                name="username"
                placeholder="yourname"
                required
              />
            </div>

            <div class="field">
              <label for="email">Email</label>
              <input
                id="email"
                type="email"
                name="email"
                placeholder="you@example.com"
                required
              />
            </div>

            <div class="field">
              <label for="password">Password</label>
              <input
                id="password"
                type="password"
                name="password"
                placeholder="••••••••"
                required
              />
            </div>

            <div class="field">
              <label for="confirm">Confirm password</label>
              <input
                id="confirm"
                type="password"
                name="confirm"
                placeholder="••••••••"
                required
              />
            </div>

            <button type="submit">Create account</button>
          </form>

          <p class="bottom">
            Already have an account? <a href="/login">Sign in</a>
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
